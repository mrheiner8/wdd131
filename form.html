<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form | WDD131</title>

    <meta name="description"
        content="WO5 basic layout for a form page, written for the Brigham Young University class WDD131.">
    <meta name="author" content="Michael Heiner">

    <link rel="stylesheet" href="styles/form.css">

    <script defer src="scripts/form.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Acme&family=Roboto:ital,wdth,wght@0,75,100..900;1,75,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form action="review.html" method="get">

            <fieldset>
                <label for="product-name">Product Name (Required)</label>
                <select name="product" id="product-name" required>
                    <option value="" disabled selected>Select a Product...</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Overall Rating (Required)</legend>
                <div class="rating-container">

                    <div class="star-group">
                        <label for="star1">★</label>
                        <input type="radio" id="star1" name="rating" value="1" required>
                    </div>

                    <div class="star-group">
                        <label for="star2">★★</label>
                        <input type="radio" id="star2" name="rating" value="2" required>
                    </div>

                    <div class="star-group">
                        <label for="star3">★★★</label>
                        <input type="radio" id="star3" name="rating" value="3" required>
                    </div>

                    <div class="star-group">
                        <label for="star4">★★★★</label>
                        <input type="radio" id="star4" name="rating" value="4" required>
                    </div>

                    <div class="star-group">
                        <label for="star5">★★★★★</label>
                        <input type="radio" id="star5" name="rating" value="5" required>
                    </div>

                </div>
            </fieldset>

            <fieldset>
                <legend>Date of Installation</legend>
                <label for="insrallation-date">Installation Date (Required)</label>
                <input type="date" id="installation-date" name="installation-date" required>
            </fieldset>

            <fieldset class="features-fieldset">
                <legend>What features did you find useful in the product?<br><i>(Check all that apply)</i></legend>

                <div class="checkbox-item">
                    <input type="checkbox" id="durability" name="features" value="durability">
                    <label for="durability">Durability</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="ease-of-use" name="features" value="ease-of-use">
                    <label for="ease-of-use">Ease of Use</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="performance" name="features" value="performance">
                    <label for="performance">Performance</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="design" name="features" value="design">
                    <label for="design">Design</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Written Review (optional)</legend>
                <label for="review">Type your review here:</label>
                <textarea id="review" name="review"></textarea>
            </fieldset>

            <fieldset>
                <legend>Name (optional)</legend>
                <label for="user-name">Your Name:</label>
                <input type="text" id="user-name" name="user-name">
            </fieldset>

            <input type="submit" value="Share Review">
        </form>
    </main>

    <footer>
        <p>©<span id="currentYear"></span> 🎷Michael Heiner 🎷 Colorado</p>
        <p>Last Modification: <span id="lastModified"></span></p>
    </footer>

</body>

</html>
